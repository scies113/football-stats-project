<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Football Stats</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-futbol"></i>
                    <span>FootballStats</span>
                </div>
                <p>Создайте аккаунт бесплатно</p>
            </div>

            <form action="#" method="POST">
                <div class="form-group">
                    <label for="firstName">Имя</label>
                    <input 
                        type="text" 
                        id="firstName" 
                        class="form-control" 
                        placeholder="Иван"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="lastName">Фамилия</label>
                    <input 
                        type="text" 
                        id="lastName" 
                        class="form-control" 
                        placeholder="Иванов"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        class="form-control" 
                        placeholder="example@mail.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <div style="position: relative;">
                        <input 
                            type="password" 
                            id="password" 
                            class="form-control" 
                            placeholder="••••••••"
                            minlength="6"
                            required
                        >
                        <button 
                            type="button" 
                            class="toggle-password"
                            style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted);"
                        >
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <small style="color: var(--text-muted); font-size: 0.75rem; margin-top: 5px; display: block;">
                        Минимум 6 символов
                    </small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Подтвердите пароль</label>
                    <div style="position: relative;">
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            class="form-control" 
                            placeholder="••••••••"
                            minlength="6"
                            required
                        >
                        <button 
                            type="button" 
                            class="toggle-password"
                            style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted);"
                        >
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="role">Роль</label>
                    <select id="role" class="form-control" required>
                        <option value="">Выберите роль</option>
                        <option value="fan">Болельщик</option>
                        <option value="analyst">Аналитик</option>
                        <option value="operator">Оператор</option>
                    </select>
                </div>

                <div class="form-options">
                    <div class="checkbox-group">
                        <input type="checkbox" id="agree" required>
                        <label for="agree" style="margin: 0; cursor: pointer; font-size: 0.875rem;">
                            Я согласен с <a href="#" style="color: var(--primary-color);">условиями использования</a>
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-full">
                    <i class="fas fa-user-plus"></i> Создать аккаунт
                </button>
            </form>

            <div class="divider">
                <span>или зарегистрируйтесь через</span>
            </div>

            <div class="social-auth">
                <button class="btn-social">
                    <i class="fab fa-google" style="color: #DB4437;"></i>
                    Google
                </button>
                <button class="btn-social">
                    <i class="fab fa-vk" style="color: #0077FF;"></i>
                    VK
                </button>
            </div>

            <div class="auth-footer">
                Уже есть аккаунт? <a href="login.html">Войти</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
